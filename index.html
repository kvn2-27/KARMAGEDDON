<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROJECT_KARMAGEDDON</title>

<style>
:root{ --red:#ff3030; --dark:#050505; --border:#441111; }
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:#000; color:var(--red); font-family:"Courier New",monospace; overflow:hidden; }

/* CRT */
body::before{ content:""; position:fixed; inset:0; pointer-events:none; background:repeating-linear-gradient(to bottom, rgba(255,255,255,.04) 0px, rgba(255,255,255,.04) 1px, transparent 2px, transparent 4px); mix-blend-mode:screen; z-index: 999; }
body::after{ content:""; position:fixed; inset:0; pointer-events:none; background:radial-gradient(circle at center, transparent 40%, rgba(0,0,0,.65) 100%); z-index: 999; }
#noise{ position:fixed; inset:0; pointer-events:none; opacity:.03; background-image:radial-gradient(#fff 1px, transparent 1px); background-size:3px 3px; animation:noise .15s infinite; z-index: 998; }
@keyframes noise{ 0%{transform:translate(0)} 25%{transform:translate(1px,-1px)} 50%{transform:translate(-1px,1px)} 75%{transform:translate(1px,1px)} 100%{transform:translate(0)} }

/* BOOT */
#boot{ position:fixed; inset:0; background:black; display:flex; justify-content:center; align-items:center; font-size:16px; text-align: center; white-space:pre-line; padding:20px; z-index:1000; }

/* APP */
#app{ display:none; height:100vh; width: 100vw; }
#topbar{ height:50px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; padding:0 15px; font-size:10px; text-align: center; }
#container{ display:flex; flex-direction: column; height:calc(100vh - 50px); }
#menu{ width:100%; border-bottom:1px solid var(--border); padding:10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; font-size: 14px; }
.option{ padding:5px; cursor:pointer; transition:.2s; }
.option:hover{ transform:scale(1.05); text-shadow:0 0 8px var(--red); }
.option.active{ font-weight:bold; }
.option.active::before{ content:"> "; animation:blink .8s infinite; }
.option:not(.active)::before{ content:"  "; }
@keyframes blink{ 50%{opacity:0;} }
#content{ flex:1; padding:20px; overflow-y:auto; white-space:pre-line; line-height:1.6; font-size: 14px; }

/* FORMS ARCHIVE */
.forms-archive { text-align: center; font-size: 16px; }
.form-row { display: flex; justify-content: center; gap: 20px; margin: 0px 0; }
.form-block { cursor: pointer; transition: .2s; padding: 2px 5px; display: inline-block; }
.form-block:hover { transform: scale(1.1); text-shadow: 0 0 10px var(--red); }
#ghost{ position:fixed; bottom:10px; right:15px; font-size:10px; opacity:.2; pointer-events:none; z-index: 1000; }
</style>
</head>

<body>
    <audio id="bgMusic" loop><source src="ambient.mp3" type="audio/mpeg"></audio>
    <audio id="clickSFX"><source src="click.wav" type="audio/wav"></audio>

    <div id="noise"></div>
    <div id="boot"></div>
    <div id="app">
        <div id="topbar">
            <div>PROJECT_KARMAGEDDON</div>
            <div>CLASS: ANOMALY | STATUS: ACTIVE</div>
        </div>
        <div id="container">
            <div id="menu">
                <div class="option active" data-id="kando">KANDO</div>
                <div class="option" data-id="order">ORDER</div>
                <div class="option" data-id="chaos">CHAOS</div>
                <div class="option" data-id="forms">FOUR FORMS</div>
                <div class="option" data-id="karmaggedon">KARMAGGEDON</div>
            </div>
            <div id="content"></div>
        </div>
    </div>
    <div id="ghost"></div>

<script>
    const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*!<>-_\\/[]{}—=+*^?#_";
    const bgMusic = document.getElementById("bgMusic");
    const clickSFX = document.getElementById("clickSFX");
    const content = document.getElementById("content");
    const boot = document.getElementById("boot");

    // Función de sonido segura
    function playClick() {
        if (clickSFX) {
            clickSFX.currentTime = 0;
            clickSFX.play().catch(e => console.warn("Clic silenciado por navegador"));
        }
    }

    // Activación de audio al primer clic (seguro)
    document.addEventListener("click", function startAudio() {
        if (bgMusic) {
            bgMusic.volume = 0.2;
            bgMusic.play().catch(e => console.warn("Audio de fondo silenciado"));
        }
        document.removeEventListener("click", startAudio);
    }, { once: true });

    /* BOOT */
    const bootText = "\n\nPROJECT_KARMAGEDDON\n\nINITIALIZING...\nLOADING FILES...\nVERIFYING ANOMALIES...\nACCESS GRANTED\n\n";
    let bootIndex = 0;
    const bootTimer = setInterval(()=>{
        boot.textContent = bootText.slice(0, bootIndex++);
        if(bootIndex > bootText.length){
            clearInterval(bootTimer);
            setTimeout(()=>{ 
                boot.style.display="none"; 
                document.getElementById("app").style.display="block"; 
                show("kando"); 
            }, 800);
        }
    }, 25);

    /* DATA */
    const data = {
        kando: "FILE_01\n\nSUBJECT: KANDO\nSTATUS: UNSTABLE\n\nVITAL FORM:\nMISSING HEART\n\nOBSERVATION:\nEl sujeto permanece consciente.\nNo se encontró una explicación válida.\nAnálisis posterior suspendido.",
        order: "FILE_02\n\nSUBJECT: ORDER\nSTATUS: STABLE\n\nLa fuerza responsable de preservar\nla coherencia entre todas las formas.\n\nSin Orden,\nla existencia se vuelve incapaz\nde diferenciar realidad y posibilidad.\n\nToda estructura conocida depende\nde su presencia constante.\n\nNo crea el sistema.\nImpide su colapso.",
        chaos: "FILE_03\n\nSUBJECT: CHAOS\nSTATUS: DANGER ALERT\n\nPosibilidad infinita.\nLa grieta entre las leyes.\n\nEl error oculto\ndentro de toda estructura.\n\nEl caos no destruye la realidad.\nLa obliga a transformarse.\n\nEl Orden lo contiene.\nNunca lo elimina."
    };

    function typeToElement(text, element) {
        element.textContent = "";
        let i = 0;
        if (element.typeTimer) clearInterval(element.typeTimer);
        element.typeTimer = setInterval(() => {
            let scramble = "";
            for(let j = 0; j < 4; j++) {
                if (i + j < text.length && text[i+j] !== '\n' && text[i+j] !== ' ') scramble += charset[Math.floor(Math.random() * charset.length)];
                else if (i + j < text.length) scramble += text[i+j];
            }
            element.textContent = text.slice(0, i) + scramble;
            i += 2;
            if (i >= text.length) { clearInterval(element.typeTimer); element.textContent = text; }
        }, 15);
    }

    function show(id){
        if(id==="forms") renderForms();
        else if(id==="karmaggedon") runKarmaggedon();
        else typeToElement(data[id], content);
    }

    document.querySelectorAll(".option").forEach(btn=>{
        btn.addEventListener("click",()=>{
            playClick();
            document.querySelectorAll(".option").forEach(x=>x.classList.remove("active"));
            btn.classList.add("active");
            show(btn.dataset.id);
        });
    });

    function renderForms(){
        content.innerHTML=`<div class="forms-archive">
        <div style="margin-bottom:5px;">FILE_04<br>FOUR FORMS</div>
        <div class="form-row"><div class="form-block" onclick="playClick(); form('carne')">CARNE</div></div>
        <div class="form-row"><div class="form-block" onclick="playClick(); form('mente')">MENTE</div><div class="form-block" onclick="playClick(); form('sangre')">SANGRE</div></div>
        <div class="form-row"><div class="form-block" onclick="playClick(); form('alma')">ALMA</div></div>
        <div id="form-info" style="margin-top:10px; border-top:1px solid var(--border); padding-top:10px; text-align:left;">SELECT A FORM.</div>
        </div>`;
    }

    window.form = function(id){
        const files = {
            carne:"FORM_01: CARNE\nREPRESENTATION: HAND\n\nLa carne es la interfaz física del sistema.\nToda experiencia debe atravesarla para ser registrada como real.",
            mente:"FORM_02: MENTE\nREPRESENTATION: EYE\n\nLa mente interpreta la información obtenida por las demás formas.\nNo registra realidad. La reorganiza para volverla comprensible.",
            sangre:"FORM_03: SANGRE\nREPRESENTATION: HEART\n\nLa sangre es impulso.\nTransporta deseo, intención y movimiento.\nEs el punto donde la existencia deja de observar y comienza a actuar.",
            alma:"FORM_04: ALMA\nREPRESENTATION: STAR\n\nEl alma es el patrón persistente.\nNo contiene recuerdos. Contiene continuidad."
        };
        typeToElement(files[id], document.getElementById("form-info"));
    };

    function runKarmaggedon(){
        let stability = 100;
        let karmaTimer = setInterval(()=>{
            stability -= Math.floor(Math.random()*7+2);
            content.textContent = "REALITY STABILITY\n\n" + stability + "%\n\nERR: CORRUPTING...";
            if(stability <= 67){
                clearInterval(karmaTimer);
                typeToElement("ANOMALY DETECTED\n\nOBJECT: KARMAGEDDON\nSTATUS: ACTIVE", content);
            }
        }, 180);
    }
</script>
</body>
</html>
