<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROJECT_KARMAGEDDON</title>

<style>

:root{
--red:#ff3030;
--dark:#050505;
--border:#441111;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:var(--red);
font-family:"Courier New",monospace;
overflow:hidden;
}

/* CRT */

body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background:
repeating-linear-gradient(
to bottom,
rgba(255,255,255,.04) 0px,
rgba(255,255,255,.04) 1px,
transparent 2px,
transparent 4px
);
mix-blend-mode:screen;
z-index: 999;
}

body::after{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background:
radial-gradient(circle at center,
transparent 40%,
rgba(0,0,0,.65) 100%);
z-index: 999;
}

#noise{
position:fixed;
inset:0;
pointer-events:none;
opacity:.03;
background-image:
radial-gradient(#fff 1px, transparent 1px);
background-size:3px 3px;
animation:noise .15s infinite;
z-index: 998;
}

@keyframes noise{
0%{transform:translate(0)}
25%{transform:translate(1px,-1px)}
50%{transform:translate(-1px,1px)}
75%{transform:translate(1px,1px)}
100%{transform:translate(0)}
}

/* BOOT */

#boot{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:16px;
text-align: center;
white-space:pre-line;
padding:20px;
z-index:1000;
}

/* APP */

#app{
display:none;
height:100vh;
width: 100vw;
}

#topbar{
height:50px;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
align-items:center;
padding:0 15px;
font-size:10px;
text-align: center;
}

#container{
display:flex;
flex-direction: column;
height:calc(100vh - 50px);
}

#menu{
width:100%;
border-bottom:1px solid var(--border);
padding:10px;
display: flex;
flex-wrap: wrap;
justify-content: center;
gap: 10px;
font-size: 14px;
}

.option{
padding:5px;
cursor:pointer;
transition:.2s;
}

.option:hover{
transform:scale(1.05);
text-shadow:0 0 8px var(--red);
}

.option.active{
font-weight:bold;
}

.option.active::before{
content:"> ";
animation:blink .8s infinite;
}

.option:not(.active)::before{
content:"  ";
}

@keyframes blink{
50%{opacity:0;}
}

#content{
flex:1;
padding:20px;
overflow-y:auto;
white-space:pre-line;
line-height:1.6;
font-size: 14px;
}

/* FORMS ARCHIVE */

.forms-archive {
text-align: center;
font-size: 18px;
}

.form-row {
display: flex;
justify-content: center;
gap: 50px;
margin: 5px 0;
}

.form-block {
cursor: pointer;
transition: .2s;
padding: 5px;
display: inline-block;
}

.form-block:hover {
transform: scale(1.1);
text-shadow: 0 0 10px var(--red);
}

/* GHOST */

#ghost{
position:fixed;
bottom:10px;
right:15px;
font-size:10px;
opacity:.2;
pointer-events:none;
z-index: 1000;
}

</style>
</head>

<body>

<div id="noise"></div>

<div id="boot"></div>

<div id="app">

<div id="topbar">

<div>PROJECT_KARMAGEDDON </div>

<div>
CLASS: ANOMALY | STATUS: ACTIVE
</div>

</div>

<div id="container">

<div id="menu">
<div class="option active" data-id="kando">KANDO</div>
<div class="option" data-id="order">ORDER</div>
<div class="option" data-id="chaos">CHAOS</div>
<div class="option" data-id="forms">FOUR FORMS</div>
<div class="option" data-id="karmaggedon">KARMAGGEDON</div>
</div>

<div id="content"></div>

</div>

</div>

<div id="ghost"></div>

<script>

/* CARACTERES PARA EL EFECTO MATRIX/GLITCH */
const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*!<>-_\\/[]{}—=+*^?#_";

/* BOOT */

const bootText = `

PROJECT_KARMAGEDDON

INITIALIZING...
LOADING FILES...
VERIFYING ANOMALIES...
ACCESS GRANTED

`;

const boot = document.getElementById("boot");
let bootIndex = 0;

const bootTimer = setInterval(()=>{
boot.textContent = bootText.slice(0, bootIndex);
bootIndex++;

if(bootIndex > bootText.length){
    clearInterval(bootTimer);
    setTimeout(()=>{
        boot.style.display="none";
        document.getElementById("app").style.display="block";
        show("kando");
    },800);
}
}, 25);

/* DATA */

const data = {

kando:`FILE_01

SUBJECT: KANDO
STATUS: UNSTABLE

VITAL FORM:
MISSING HEART

OBSERVATION:
El sujeto permanece consciente.
No se encontró una explicación válida.
Análisis posterior suspendido.`,

order:`FILE_02

SUBJECT: ORDER
STATUS: STABLE

La fuerza responsable de preservar
la coherencia entre todas las formas.

Sin Orden,
la existencia se vuelve incapaz
de diferenciar realidad y posibilidad.

Toda estructura conocida depende
de su presencia constante.

No crea el sistema.
Impide su colapso.`,

chaos:`FILE_03

SUBJECT: CHAOS
STATUS: DANGER ALERT

Posibilidad infinita.
La grieta entre las leyes.

El error oculto
dentro de toda estructura.

El caos no destruye la realidad.
La obliga a transformarse.

El Orden lo contiene.
Nunca lo elimina.`

};

/* MENU */

document.querySelectorAll(".option").forEach(btn=>{
    btn.addEventListener("click",()=>{
        document.querySelectorAll(".option")
        .forEach(x=>x.classList.remove("active"));
        btn.classList.add("active");
        show(btn.dataset.id);
    });
});

const content = document.getElementById("content");

/* LOGICA DE DECODIFICACION MATRIX */

let transTimer;
let karmaTimer;

function typeToElement(text, element) {
    element.textContent = "";
    let i = 0;
    if (element.typeTimer) clearInterval(element.typeTimer);
    
    element.typeTimer = setInterval(() => {
        let current = text.slice(0, i);
        let scramble = "";
        
        // Añade una pequeña cola de caracteres aleatorios simulando desencriptación
        for(let j = 0; j < 4; j++) {
            if (i + j < text.length && text[i+j] !== '\n' && text[i+j] !== ' ') {
                scramble += charset[Math.floor(Math.random() * charset.length)];
            } else if (i + j < text.length) {
                scramble += text[i+j];
            }
        }
        
        element.textContent = current + scramble;
        i += 2; // Velocidad de escritura
        
        if (i >= text.length) {
            clearInterval(element.typeTimer);
            element.textContent = text;
        }
    }, 15);
}

function glitchTransition(callback) {
    if(content.typeTimer) clearInterval(content.typeTimer);
    clearInterval(karmaTimer);
    clearInterval(transTimer);
    
    let cycles = 0;
    const maxCycles = 6; // Duración del pantallazo encriptado
    
    // Scramble de transición completo en toda la sección
    transTimer = setInterval(() => {
        let scramble = "";
        for(let j = 0; j < 150; j++) {
            scramble += charset[Math.floor(Math.random() * charset.length)];
            if(j % 30 === 0 && j > 0) scramble += "\n";
        }
        content.textContent = scramble;
        cycles++;
        
        if(cycles >= maxCycles) {
            clearInterval(transTimer);
            content.textContent = "";
            callback();
        }
    }, 35);
}

/* SHOW */

function show(id){
    glitchTransition(()=>{
        if(id==="forms"){
            renderForms();
            return;
        }
        if(id==="karmaggedon"){
            runKarmaggedon();
            return;
        }
        typeToElement(data[id], content);
    });
}

/* FORMS */

function renderForms(){
    content.innerHTML=`
    <div class="forms-archive">

    <div style="margin-bottom:5px; line-height:1.2;">
    FILE_04
    FOUR FORMS
    </div>

    <div class="form-row">
    <div class="form-block" onclick="form('carne')">CARNE</div>
    </div>

    <div class="form-row">
    <div class="form-block" onclick="form('mente')">MENTE</div>
    <div class="form-block" onclick="form('sangre')">SANGRE</div>
    </div>

    <div class="form-row">
    <div class="form-block" onclick="form('alma')">ALMA</div>
    </div>

    <div id="form-info" style="
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--border);
    text-align:left;
    white-space:pre-line;
    font-size: 14px;
    ">
    SELECT A FORM.
    </div>

    </div>
    `;
}

window.form=function(id){
    const files={
        carne:`FORM_01: CARNE
REPRESENTATION: HAND

La carne es la interfaz física del sistema.
Toda experiencia debe atravesarla para ser registrada como real.
Sin carne no existe percepción.
Sin percepción no existe existencia consciente.`,

        mente:`FORM_02: MENTE
REPRESENTATION: EYE

La mente interpreta la información obtenida por las demás formas.
No registra realidad. La reorganiza para volverla comprensible.
Toda identidad es una construcción temporal.`,

        sangre:`FORM_03: SANGRE
REPRESENTATION: HEART

La sangre es impulso.
Transporta deseo, intención y movimiento.
Es el punto donde la existencia deja de observar y comienza a actuar.`,

        alma:`FORM_04: ALMA
REPRESENTATION: STAR

El alma es el patrón persistente.
No contiene recuerdos. Contiene continuidad.
Es lo que permanece cuando todo lo demás desaparece.`
    };

    // Aplica el mismo efecto matrix al texto de la forma seleccionada
    const infoDiv = document.getElementById("form-info");
    if(infoDiv){
        typeToElement(files[id], infoDiv);
    }
};

/* KARMAGEDDON */

function runKarmaggedon(){
    let stability = 100;
    
    content.textContent = "REALITY STABILITY\n\n100%";

    karmaTimer = setInterval(()=>{
        stability -= Math.floor(Math.random()*7+2);
        
        // Simula corrupción de memoria en vez de sacudir la pantalla
        let corruptData = "";
        for(let k=0; k<15; k++){
            corruptData += charset[Math.floor(Math.random() * charset.length)];
        }

        content.textContent = "REALITY STABILITY\n\n" + stability + "%\n\nERR: " + corruptData;

        if(stability <= 67){
            clearInterval(karmaTimer);
            typeToElement(`ANOMALY DETECTED\n\nFILE_05\n\nOBJECT: KARMAGEDDON\nCLASSIFICATION: ANOMALÍA\n\nVITAL FORM DESTROYED OUT TIME\nCONSCIOUSNESS REMAINS\n\nSTATUS: ACTIVE`, content);
        }
    }, 180);
}

/* GHOST MESSAGES */

const ghosts = [
    "HE SHOULD BE DEAD",
    "REALITY INCONSISTENCY DETECTED",
    "SUBJECT REFUSES TERMINATION",
    "VITAL FORM: MISSING",
    "ANOMALY STILL ACTIVE"
];

setInterval(()=>{
    const el = document.getElementById("ghost");
    el.textContent = ghosts[Math.floor(Math.random()*ghosts.length)];
    
    setTimeout(()=>{
        el.textContent="";
    }, 900);
}, 10000);

</script>

</body>
</html>
